<div class="card shadow-sm">
  <div class="card-header bg-primary text-white fw-semibold">{{ title }}</div>
  <div class="card-body">
    <ng-content select="[form-fields]"></ng-content>
    <div class="mt-3 d-flex gap-2">
      <button class="btn btn-primary btn-sm" type="button" (click)="submitted.emit()">{{ submitLabel }}</button>
      <button class="btn btn-outline-secondary btn-sm" type="button" (click)="cancelled.emit()">{{ cancelLabel }}</button>
    </div>
  </div>
</div>
