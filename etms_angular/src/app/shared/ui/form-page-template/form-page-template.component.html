<section class="hrms-section-card">
  <div class="hrms-section-card__header">{{ title }}</div>
  <div class="hrms-section-card__body">
    <ng-content select="[form-fields]"></ng-content>
    <div class="hrms-form-actions mt-3">
      <button class="btn btn-primary" type="button" (click)="submitted.emit()">{{ submitLabel }}</button>
      <button class="btn btn-outline-secondary" type="button" (click)="cancelled.emit()">{{ cancelLabel }}</button>
    </div>
  </div>
</section>
