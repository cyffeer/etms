<div class="card shadow-sm">
  <div class="card-header bg-primary text-white fw-semibold">{{ title }}</div>
  <div class="table-responsive">
    <table class="table table-striped table-hover mb-0">
      <thead>
        <tr>
          <th *ngFor="let c of columns">{{ c.label }}</th>
          <th *ngIf="rowActions">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of rows">
          <td *ngFor="let c of columns">{{ row[c.key] }}</td>
          <td *ngIf="rowActions">
            <ng-container *ngTemplateOutlet="rowActions; context: { $implicit: row }"></ng-container>
          </td>
        </tr>
        <tr *ngIf="!rows?.length">
          <td [attr.colspan]="columns.length + (rowActions ? 1 : 0)" class="text-center text-muted py-3">
            No records found
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
