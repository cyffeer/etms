<section class="hrms-section-card">
  <div class="hrms-section-card__header">{{ title }}</div>
  <div class="table-responsive">
    <table class="table hrms-responsive-table align-middle mb-0">
      <thead>
        <tr>
          <th *ngFor="let c of columns">{{ c.label }}</th>
          <th *ngIf="rowActions">Actions</th>
        </tr>
      </thead>
      <tbody>
        <tr *ngFor="let row of rows">
          <td *ngFor="let c of columns" [attr.data-label]="c.label">{{ row[c.key] }}</td>
          <td *ngIf="rowActions" data-label="Actions">
            <ng-container *ngTemplateOutlet="rowActions; context: { $implicit: row }"></ng-container>
          </td>
        </tr>
        <tr *ngIf="!rows?.length">
          <td [attr.colspan]="columns.length + (rowActions ? 1 : 0)" class="text-center text-muted py-3">
            No records found
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</section>
