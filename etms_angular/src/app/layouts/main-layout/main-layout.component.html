<div class="etms-shell">
  <header class="etms-topbar">
    <div class="etms-topbar__utility">
      <div class="etms-portal-tag">ETMS Portal</div>
      <button class="etms-mobile-toggle" type="button" (click)="toggleMobileNav()">Modules</button>
    </div>

    <div class="etms-topbar__main">
      <div>
        <p class="etms-kicker mb-1">Human Resource Management System</p>
        <h1 class="etms-title mb-0">Employee and Training Management System</h1>
      </div>

      <div class="etms-userpanel" *ngIf="user$ | async as user">
        <div class="etms-userpanel__meta">Logged In</div>
        <div class="etms-userpanel__name">{{ user.username }}</div>
        <div class="etms-userpanel__role">{{ user.role || 'ETMS User' }}</div>
        <button class="btn btn-warning btn-sm mt-2" type="button" (click)="logout()">Logout</button>
      </div>
    </div>
  </header>

  <section class="etms-ribbon">
    <div class="etms-ribbon__crumb">HRMS Application</div>
    <div class="etms-ribbon__title">{{ currentPageTitle }}</div>
  </section>

  <div class="etms-body">
    <aside class="etms-sidebar" [class.etms-sidebar--open]="mobileNavOpen">
      <div class="etms-sidebar-heading">Modules</div>

      <nav class="nav flex-column gap-2">
        <a
          *ngFor="let item of navItems"
          [routerLink]="item.path"
          routerLinkActive="active"
          class="etms-nav-link"
          (click)="closeMobileNav()"
        >
          <span class="etms-nav-label">{{ item.label }}</span>
        </a>
      </nav>
    </aside>

    <button
      *ngIf="mobileNavOpen"
      type="button"
      class="etms-sidebar-backdrop"
      (click)="closeMobileNav()"
      aria-label="Close module navigation"
    ></button>

    <main class="etms-content">
      <div class="etms-page-frame">
        <router-outlet></router-outlet>
      </div>
    </main>
  </div>
</div>
