<div class="page-container">
  <h2>{{ isEdit ? 'Edit' : 'Create' }} Leave</h2>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
  <div *ngIf="loading">Loading...</div>

  <form *ngIf="!loading" [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-group">
      <label>Employee Number *</label>
      <input class="form-control" formControlName="employeeNumber" />
    </div>

    <div class="form-group">
      <label>Leave Type *</label>
      <input class="form-control" formControlName="leaveType" />
    </div>

    <div class="form-group">
      <label>Start Date *</label>
      <input type="date" class="form-control" formControlName="startDate" />
    </div>

    <div class="form-group">
      <label>End Date *</label>
      <input type="date" class="form-control" formControlName="endDate" />
    </div>

    <small *ngIf="form.hasError('dateRange')" class="text-danger">End date must be on or after start date.</small>

    <div class="form-group">
      <label>Status</label>
      <input class="form-control" formControlName="status" />
    </div>

    <div class="form-group">
      <label>Remarks</label>
      <textarea class="form-control" formControlName="remarks"></textarea>
    </div>

    <div class="form-actions">
      <button class="btn btn-primary" type="submit" [disabled]="form.invalid || saving">
        {{ saving ? 'Saving...' : 'Save' }}
      </button>
      <button class="btn btn-secondary" type="button" (click)="cancel()">Cancel</button>
    </div>
  </form>
</div>
