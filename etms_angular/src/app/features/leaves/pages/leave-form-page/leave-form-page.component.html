<section class="page-hero page-hero--compact mb-4">
  <span class="page-hero__eyebrow">Leave Monitoring</span>
  <h2 class="page-hero__title">{{ isEdit ? 'Update Leave Request' : 'Apply For Leave' }}</h2>
</section>

<div *ngIf="error" class="alert alert-danger">{{ error }}</div>
<div *ngIf="loading" class="alert alert-info">Loading leave record...</div>

<form *ngIf="!loading" [formGroup]="form" (ngSubmit)="submit()" class="hrms-form-shell">
  <section class="hrms-section-card">
    <div class="hrms-section-card__header">
      <span>Leave Application</span>
    </div>
    <div class="hrms-section-card__body">
      <div class="hrms-form-grid hrms-form-grid--wide">
        <div class="hrms-form-field">
          <label class="form-label">Employee Number *</label>
          <input class="form-control" formControlName="employeeNumber" />
        </div>

        <div class="hrms-form-field">
          <label class="form-label">Leave Type *</label>
          <select class="form-select" formControlName="leaveType">
            <option value="">Select leave type</option>
            <option *ngFor="let leaveType of leaveTypes" [value]="leaveType.leaveTypeCode">
              {{ leaveType.leaveTypeCode }} - {{ leaveType.leaveTypeName }}
            </option>
          </select>
        </div>

        <div class="hrms-form-field">
          <label class="form-label">Start Date *</label>
          <input type="date" class="form-control" formControlName="startDate" />
        </div>

        <div class="hrms-form-field">
          <label class="form-label">End Date *</label>
          <input type="date" class="form-control" formControlName="endDate" />
        </div>

        <div class="hrms-form-field">
          <label class="form-label">Status</label>
          <select class="form-select" formControlName="status">
            <option value="">Draft</option>
            <option value="PENDING">Pending</option>
            <option value="APPROVED">Approved</option>
            <option value="REJECTED">Rejected</option>
            <option value="CANCELLED">Cancelled</option>
          </select>
        </div>

        <div class="hrms-form-field hrms-form-field--full">
          <label class="form-label">Remarks</label>
          <textarea rows="4" class="form-control" formControlName="remarks"></textarea>
        </div>
      </div>

      <small *ngIf="form.hasError('dateRange')" class="hrms-error d-block mt-2">End date must be on or after start date.</small>
    </div>
  </section>

  <div class="hrms-form-actions">
    <button class="btn btn-primary" type="submit" [disabled]="form.invalid || saving">
      {{ saving ? 'Saving...' : 'Save' }}
    </button>
    <button class="btn btn-outline-secondary" type="button" (click)="cancel()">Cancel</button>
  </div>
</form>
