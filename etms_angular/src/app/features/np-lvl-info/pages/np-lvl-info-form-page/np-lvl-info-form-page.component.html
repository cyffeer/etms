<section class="page-hero page-hero--compact mb-4">
  <span class="page-hero__eyebrow">Nihongo Proficiency</span>
  <h2 class="page-hero__title">{{ isEdit ? 'Edit Nihongo Level Rule' : 'Create Nihongo Level Rule' }}</h2>
</section>

<div *ngIf="loading && isEdit" class="alert alert-info">Loading Nihongo level rule...</div>
<div *ngIf="error" class="alert alert-danger">{{ error }}</div>

<form class="hrms-form-shell" [formGroup]="form" (ngSubmit)="submit()">
  <section class="hrms-section-card">
    <header class="hrms-section-card__header">
      <span>Level Rule Details</span>
    </header>
    <div class="hrms-section-card__body">
      <div class="hrms-form-grid hrms-form-grid--wide">
        <div class="hrms-form-field">
          <label class="form-label" for="npLevelCode">Level Code</label>
          <input id="npLevelCode" type="text" class="form-control" formControlName="npLvlInfoCode" />
          <small class="hrms-error" *ngIf="form.controls.npLvlInfoCode.touched && form.controls.npLvlInfoCode.invalid">
            Level code is required.
          </small>
        </div>

        <div class="hrms-form-field">
          <label class="form-label" for="npLevelName">Level Name</label>
          <input id="npLevelName" type="text" class="form-control" formControlName="npLvlInfoName" />
          <small class="hrms-error" *ngIf="form.controls.npLvlInfoName.touched && form.controls.npLvlInfoName.invalid">
            Level name is required.
          </small>
        </div>

        <div class="hrms-form-field">
          <label class="form-label" for="npTypeCode">Nihongo Type Code</label>
          <input id="npTypeCode" type="text" class="form-control" formControlName="npTypeCode" />
          <small class="hrms-error" *ngIf="form.controls.npTypeCode.touched && form.controls.npTypeCode.invalid">
            Nihongo type code is required.
          </small>
        </div>

        <div class="hrms-form-field">
          <label class="form-label" for="npValidFrom">Valid From</label>
          <input id="npValidFrom" type="date" class="form-control" formControlName="validFrom" />
        </div>

        <div class="hrms-form-field">
          <label class="form-label" for="npValidTo">Valid To</label>
          <input id="npValidTo" type="date" class="form-control" formControlName="validTo" />
        </div>

        <div class="hrms-form-field">
          <label class="form-label" for="npAllowanceAmount">Allowance Amount</label>
          <input id="npAllowanceAmount" type="number" step="0.01" class="form-control" formControlName="allowanceAmount" />
        </div>

        <div class="hrms-form-field">
          <label class="form-label" for="npAllowanceCurrency">Allowance Currency</label>
          <input id="npAllowanceCurrency" type="text" class="form-control" formControlName="allowanceCurrency" />
        </div>

        <div class="hrms-form-field hrms-form-field--full">
          <div class="form-check mt-2">
            <input id="npRuleActive" class="form-check-input" type="checkbox" formControlName="active" />
            <label class="form-check-label" for="npRuleActive">Active</label>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div class="hrms-form-actions">
    <button type="submit" class="btn btn-primary" [disabled]="loading">{{ loading ? 'Saving...' : 'Save' }}</button>
    <a class="btn btn-outline-secondary" routerLink="/np-lvl-info">Cancel</a>
  </div>
</form>
