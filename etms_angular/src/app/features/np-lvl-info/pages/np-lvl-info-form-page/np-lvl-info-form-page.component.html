<h2>{{ isEdit ? 'Edit NP Level Info' : 'Create NP Level Info' }}</h2>
<p *ngIf="error" style="color:#b91c1c">{{ error }}</p>

<form [formGroup]="form" (ngSubmit)="submit()">
  <label>NP Level Info Code</label><br />
  <input type="text" formControlName="npLvlInfoCode" /><br /><br />

  <label>NP Level Info Name</label><br />
  <input type="text" formControlName="npLvlInfoName" /><br /><br />

  <label>NP Type Code</label><br />
  <input type="text" formControlName="npTypeCode" /><br /><br />

  <label>Valid From</label><br />
  <input type="date" formControlName="validFrom" /><br /><br />

  <label>Valid To</label><br />
  <input type="date" formControlName="validTo" /><br /><br />

  <label>Allowance Amount</label><br />
  <input type="number" step="0.01" formControlName="allowanceAmount" /><br /><br />

  <label>Allowance Currency</label><br />
  <input type="text" formControlName="allowanceCurrency" /><br /><br />

  <label><input type="checkbox" formControlName="active" /> Active</label><br /><br />

  <button type="submit" [disabled]="loading">{{ loading ? 'Saving...' : 'Save' }}</button>
  <a routerLink="/np-lvl-info" style="margin-left:8px;">Cancel</a>
</form>
