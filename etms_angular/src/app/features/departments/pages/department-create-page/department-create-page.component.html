<section class="page-hero page-hero--compact mb-4">
  <span class="page-hero__eyebrow">Administration</span>
  <h2 class="page-hero__title">Create Department</h2>
</section>

<div *ngIf="loading" class="alert alert-info">Saving department...</div>
<div *ngIf="error" class="alert alert-danger">{{ error }}</div>

<form class="hrms-form-shell" [formGroup]="form" (ngSubmit)="submit()">
  <section class="hrms-section-card">
    <header class="hrms-section-card__header">
      <span>Department Details</span>
    </header>
    <div class="hrms-section-card__body">
      <div class="hrms-form-grid hrms-form-grid--wide">
        <div class="hrms-form-field">
          <label class="form-label" for="createDepartmentCode">Department Code</label>
          <input id="createDepartmentCode" type="text" class="form-control" formControlName="departmentCode" />
          <small class="hrms-error" *ngIf="form.controls.departmentCode.touched && form.controls.departmentCode.invalid">
            Department code is required (max 30).
          </small>
        </div>

        <div class="hrms-form-field">
          <label class="form-label" for="createDepartmentName">Department Name</label>
          <input id="createDepartmentName" type="text" class="form-control" formControlName="departmentName" />
          <small class="hrms-error" *ngIf="form.controls.departmentName.touched && form.controls.departmentName.invalid">
            Department name is required (max 150).
          </small>
        </div>

        <div class="hrms-form-field hrms-form-field--full">
          <div class="form-check mt-2">
            <input id="createDepartmentActive" class="form-check-input" type="checkbox" formControlName="active" />
            <label class="form-check-label" for="createDepartmentActive">Active</label>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div class="hrms-form-actions">
    <button type="submit" class="btn btn-primary" [disabled]="loading">Save</button>
    <a class="btn btn-outline-secondary" routerLink="/departments">Cancel</a>
  </div>
</form>
