<div class="login-screen">
  <div class="container">
    <div class="row justify-content-center align-items-center min-vh-100">
      <div class="col-12 col-lg-7 col-xl-5">
        <div class="login-panel">
          <div class="login-panel__header">
            <div class="login-panel__heading">Employee and Training Management System</div>
          </div>

          <div class="login-panel__subbar">
            <span>FETP</span>
          </div>

          <div class="login-panel__body">
            <div class="login-form-card">
              <h2 class="h4 mb-1">Sign In</h2>

              <div *ngIf="errorMessage" class="alert alert-danger py-2">{{ errorMessage }}</div>

              <form (ngSubmit)="login()" class="login-form-grid">
                <label class="login-form-grid__label" for="username">Login ID</label>
                <input
                  id="username"
                  class="form-control login-field"
                  [(ngModel)]="username"
                  name="username"
                  autocomplete="username"
                />

                <label class="login-form-grid__label" for="password">Password</label>
                <input
                  id="password"
                  type="password"
                  class="form-control login-field"
                  [(ngModel)]="password"
                  name="password"
                  autocomplete="current-password"
                />

                <div class="login-actions">
                  <button class="btn btn-warning px-4" type="submit" [disabled]="loading">
                    {{ loading ? 'Signing In...' : 'Login' }}
                  </button>
                  <button class="btn btn-outline-secondary px-4" type="button" (click)="reset()">Clear</button>
                </div>
              </form>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
