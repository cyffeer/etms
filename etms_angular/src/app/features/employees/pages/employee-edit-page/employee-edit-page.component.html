<section class="page-hero mb-4">
  <span class="page-hero__eyebrow">Administration</span>
  <h2 class="page-hero__title">Update Employee Record</h2>
  <p class="page-hero__copy">Edit the selected employee record and save the changes back to the ETMS backend.</p>
</section>

<div *ngIf="loading" class="alert alert-info">Loading employee record...</div>
<div *ngIf="error" class="alert alert-danger">{{ error }}</div>

<form *ngIf="!loading" [formGroup]="form" (ngSubmit)="submit()" class="hrms-form-shell">
  <section class="hrms-section-card">
    <div class="hrms-section-card__header">
      <span>Employee Details</span>
      <span class="hrms-meta-note">Use the same employee code stored in the backend</span>
    </div>
    <div class="hrms-section-card__body">
      <div class="hrms-form-grid hrms-form-grid--wide">
        <div class="hrms-form-field">
          <label class="form-label">Employee Code *</label>
          <input class="form-control" type="text" formControlName="employeeCode" />
        </div>

        <div class="hrms-form-field">
          <label class="form-label">First Name *</label>
          <input class="form-control" type="text" formControlName="firstName" />
        </div>

        <div class="hrms-form-field">
          <label class="form-label">Last Name *</label>
          <input class="form-control" type="text" formControlName="lastName" />
        </div>

        <div class="hrms-form-field">
          <label class="form-label">Email Address *</label>
          <input class="form-control" type="email" formControlName="email" />
        </div>

        <div class="hrms-form-field">
          <label class="form-label">Hire Date</label>
          <input class="form-control" type="date" formControlName="hireDate" />
        </div>

        <div class="hrms-form-field">
          <label class="form-label">Employment Status</label>
          <div class="form-check mt-2">
            <input class="form-check-input" id="editEmployeeActive" type="checkbox" formControlName="active" />
            <label class="form-check-label" for="editEmployeeActive">Active employee</label>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div class="hrms-form-actions">
    <button class="btn btn-primary" type="submit">Update Employee</button>
    <a class="btn btn-outline-secondary" routerLink="/employees">Cancel</a>
  </div>
</form>
