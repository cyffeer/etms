<nav class="module-subnav mb-4">
  <a routerLink="/training/types" routerLinkActive="active" class="module-subnav__link">Training Types</a>
  <a routerLink="/training/info" routerLinkActive="active" class="module-subnav__link">Training Info</a>
  <a routerLink="/training/history" routerLinkActive="active" class="module-subnav__link">Training History</a>
  <a routerLink="/training/vendors" routerLinkActive="active" class="module-subnav__link">Vendors</a>
</nav>

<section class="page-hero mb-4">
  <span class="page-hero__eyebrow">Monitoring And Management</span>
  <h2 class="page-hero__title">Assign Training</h2>
</section>

<div *ngIf="error" class="alert alert-danger">{{ error }}</div>

<form [formGroup]="form" (ngSubmit)="submit()" class="hrms-form-shell">
  <section class="hrms-section-card">
    <div class="hrms-section-card__header">Training Assignment</div>
    <div class="hrms-section-card__body">
      <div class="hrms-form-grid hrms-form-grid--wide">
        <div class="hrms-form-field">
          <label class="form-label">Employee Number *</label>
          <input formControlName="employeeNumber" class="form-control" />
        </div>

        <div class="hrms-form-field">
          <label class="form-label">Training ID *</label>
          <input type="number" formControlName="trngId" class="form-control" />
        </div>
      </div>
    </div>
  </section>

  <div class="hrms-form-actions">
    <button type="submit" [disabled]="form.invalid || saving" class="btn btn-primary">
      {{ saving ? 'Saving...' : 'Assign Training' }}
    </button>
    <button type="button" (click)="cancel()" class="btn btn-outline-secondary">Cancel</button>
  </div>
</form>
