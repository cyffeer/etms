<div class="page-container">
  <h2>{{ isEdit ? 'Edit' : 'Create' }} Training Type</h2>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

  <div *ngIf="loading" class="spinner">Loading...</div>

  <form [formGroup]="form" (ngSubmit)="submit()" *ngIf="!loading">
    <div class="form-group">
      <label>Name *</label>
      <input formControlName="trngTypeNm" class="form-control" />
      <div class="error" *ngIf="form.get('trngTypeNm')?.hasError('required')">Required</div>
      <div class="error" *ngIf="form.get('trngTypeNm')?.hasError('maxlength')">Max 25 chars</div>
    </div>

    <div class="form-group">
      <label>Description</label>
      <textarea formControlName="description" class="form-control"></textarea>
      <div class="error" *ngIf="form.get('description')?.hasError('maxlength')">Max 150 chars</div>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="form.invalid || saving" class="btn btn-primary">
        {{ saving ? 'Saving...' : 'Save' }}
      </button>
      <button type="button" (click)="cancel()" class="btn btn-secondary">Cancel</button>
    </div>
  </form>
</div>
