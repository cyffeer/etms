<nav class="module-subnav mb-4">
  <a routerLink="/training/types" routerLinkActive="active" class="module-subnav__link">Training Types</a>
  <a routerLink="/training/info" routerLinkActive="active" class="module-subnav__link">Training Info</a>
  <a routerLink="/training/history" routerLinkActive="active" class="module-subnav__link">Training History</a>
  <a routerLink="/training/vendors" routerLinkActive="active" class="module-subnav__link">Vendors</a>
</nav>

<section class="page-hero page-hero--compact mb-4">
  <span class="page-hero__eyebrow">Master Data</span>
  <h2 class="page-hero__title">{{ isEdit ? 'Edit' : 'Add' }} Training Info</h2>
</section>

<div *ngIf="error" class="alert alert-danger">{{ error }}</div>
<div *ngIf="loading" class="alert alert-info">Loading training record...</div>

<form [formGroup]="form" (ngSubmit)="submit()" *ngIf="!loading" class="hrms-form-shell">
  <section class="hrms-section-card">
    <div class="hrms-section-card__header">Training Information</div>
    <div class="hrms-section-card__body">
      <div class="hrms-form-grid hrms-form-grid--wide">
        <div class="hrms-form-field">
          <label class="form-label">Training Code *</label>
          <input formControlName="trngCode" class="form-control" />
        </div>

        <div class="hrms-form-field">
          <label class="form-label">Training Name *</label>
          <input formControlName="trngName" class="form-control" />
        </div>

        <div class="hrms-form-field">
          <label class="form-label">Type Code *</label>
          <input formControlName="trngTypeCode" class="form-control" />
        </div>

        <div class="hrms-form-field">
          <label class="form-label">Vendor Code</label>
          <input formControlName="vendorCode" class="form-control" />
        </div>

        <div class="hrms-form-field">
          <label class="form-label">Start Date</label>
          <input type="date" formControlName="startDate" class="form-control" />
        </div>

        <div class="hrms-form-field">
          <label class="form-label">End Date</label>
          <input type="date" formControlName="endDate" class="form-control" />
        </div>

        <div class="hrms-form-field">
          <label class="form-label">Location</label>
          <input formControlName="location" class="form-control" />
        </div>

        <div class="hrms-form-field">
          <label class="form-label">Status</label>
          <select class="form-select" formControlName="active">
            <option [ngValue]="true">Active</option>
            <option [ngValue]="false">Inactive</option>
          </select>
        </div>

        <div class="hrms-form-field hrms-form-field--wide">
          <label class="form-label">Training Certificate</label>
          <input type="file" class="form-control" (change)="onCertificateSelected($event)" accept=".pdf,.jpg,.jpeg,.png,.webp" />
          <div class="form-text">Upload a training certificate after saving or when updating the training record.</div>
          <div class="mt-2 small text-success" *ngIf="certificateMessage">{{ certificateMessage }}</div>
        </div>
      </div>

      <div class="hrms-form-actions mt-3">
        <button type="submit" [disabled]="form.invalid || saving" class="btn btn-primary">
          {{ saving ? 'Saving...' : 'Save' }}
        </button>
        <button type="button" (click)="cancel()" class="btn btn-outline-secondary">Cancel</button>
      </div>
    </div>
  </section>
</form>
