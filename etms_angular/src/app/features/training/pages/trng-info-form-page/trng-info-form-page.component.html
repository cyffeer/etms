<div class="page-container">
  <h2>{{ isEdit ? 'Edit' : 'Create' }} Training Info</h2>

  <div *ngIf="error" class="alert alert-danger">{{ error }}</div>
  <div *ngIf="loading" class="spinner">Loading...</div>

  <form [formGroup]="form" (ngSubmit)="submit()" *ngIf="!loading">
    <div class="form-group">
      <label>Code *</label>
      <input formControlName="trngCode" class="form-control" />
      <div class="error" *ngIf="form.get('trngCode')?.hasError('required')">Required</div>
    </div>

    <div class="form-group">
      <label>Name *</label>
      <input formControlName="trngName" class="form-control" />
      <div class="error" *ngIf="form.get('trngName')?.hasError('required')">Required</div>
    </div>

    <div class="form-group">
      <label>Type Code *</label>
      <input formControlName="trngTypeCode" class="form-control" />
      <div class="error" *ngIf="form.get('trngTypeCode')?.hasError('required')">Required</div>
    </div>

    <div class="form-group">
      <label>Vendor Code</label>
      <input formControlName="vendorCode" class="form-control" />
    </div>

    <div class="form-group">
      <label>Start Date</label>
      <input type="date" formControlName="startDate" class="form-control" />
    </div>

    <div class="form-group">
      <label>End Date</label>
      <input type="date" formControlName="endDate" class="form-control" />
    </div>

    <div class="form-group">
      <label>Location</label>
      <input formControlName="location" class="form-control" />
    </div>

    <div class="form-group">
      <label>
        <input type="checkbox" formControlName="active" />
        Active
      </label>
    </div>

    <div class="form-actions">
      <button type="submit" [disabled]="form.invalid || saving" class="btn btn-primary">
        {{ saving ? 'Saving...' : 'Save' }}
      </button>
      <button type="button" (click)="cancel()" class="btn btn-secondary">Cancel</button>
    </div>
  </form>
</div>
