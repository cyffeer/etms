<app-main-layout>
  <div class="container-fluid py-3 hrms-page">
    <div class="hrms-page-title">HRMS Application - Attendance</div>

    <div class="hrms-section mb-3">
      <div class="hrms-section-header">Search Required Month's Attendance</div>
      <div class="hrms-section-body">
        <div class="row g-3 align-items-end">
          <div class="col-md-2">
            <label class="form-label">Year</label>
            <input type="number" class="form-control form-control-sm" value="2026" />
          </div>

          <div class="col-md-3">
            <label class="form-label">Month</label>
            <select class="form-select form-select-sm">
              <option>April</option>
              <option>May</option>
              <option>June</option>
            </select>
          </div>

          <div class="col-md-2">
            <button class="btn btn-sm hrms-btn w-100">Search</button>
          </div>

          <div class="col-md-5 text-md-end">
            <div class="attendance-legend">
              <span><i class="box present"></i> Present</span>
              <span><i class="box absent"></i> Absent</span>
              <span><i class="box holiday"></i> Holiday</span>
              <span><i class="box today"></i> Today</span>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="hrms-section mb-3">
      <div class="hrms-section-header d-flex justify-content-between align-items-center">
        <span>Mark Attendance</span>
        <button class="btn btn-sm hrms-btn">Save</button>
      </div>
      <div class="hrms-section-body">
        <div class="row g-3">
          <div class="col-md-3">
            <label class="form-label">Employee ID</label>
            <input type="text" class="form-control form-control-sm" value="50008807" />
          </div>
          <div class="col-md-3">
            <label class="form-label">Employee Name</label>
            <input type="text" class="form-control form-control-sm" value="Shad Chandr Shivastriv" />
          </div>
          <div class="col-md-3">
            <label class="form-label">Designation</label>
            <input type="text" class="form-control form-control-sm" value="Assistant Engineer" />
          </div>
          <div class="col-md-3">
            <label class="form-label">Office Name</label>
            <input type="text" class="form-control form-control-sm" value="Water Resources Division, Bhopal" />
          </div>
        </div>

        <div class="table-responsive mt-3">
          <table class="table table-bordered table-sm hrms-table mb-0">
            <thead>
              <tr>
                <th style="width: 110px;">Date</th>
                <th style="width: 140px;">Mark Attendance</th>
                <th>In Time</th>
                <th>Out Time</th>
                <th style="width: 130px;">Working Hours</th>
                <th style="width: 120px;">Remarks</th>
              </tr>
            </thead>
            <tbody>
              <tr>
                <td>14/04/2026</td>
                <td>
                  <select class="form-select form-select-sm">
                    <option>Present</option>
                    <option>Absent</option>
                    <option>Half Day</option>
                    <option>Holiday</option>
                  </select>
                </td>
                <td><input type="time" class="form-control form-control-sm" value="09:30" /></td>
                <td><input type="time" class="form-control form-control-sm" value="18:00" /></td>
                <td><input type="text" class="form-control form-control-sm" value="08:30" /></td>
                <td><input type="text" class="form-control form-control-sm" value="On Duty" /></td>
              </tr>
              <tr>
                <td>15/04/2026</td>
                <td>
                  <select class="form-select form-select-sm">
                    <option>Present</option>
                    <option selected>Absent</option>
                    <option>Half Day</option>
                    <option>Holiday</option>
                  </select>
                </td>
                <td><input type="time" class="form-control form-control-sm" /></td>
                <td><input type="time" class="form-control form-control-sm" /></td>
                <td><input type="text" class="form-control form-control-sm" /></td>
                <td><input type="text" class="form-control form-control-sm" /></td>
              </tr>
            </tbody>
          </table>
        </div>

        <div class="d-flex justify-content-end gap-2 mt-3">
          <button class="btn btn-sm hrms-btn">Save</button>
          <button class="btn btn-sm hrms-btn">Cancel</button>
        </div>
      </div>
    </div>

    <div class="hrms-section">
      <div class="hrms-section-header">To Mark Attendance For Multiple Days</div>
      <div class="hrms-section-body">
        <div class="row g-3">
          <div class="col-md-2">
            <label class="form-label">From</label>
            <input type="date" class="form-control form-control-sm" />
          </div>
          <div class="col-md-2">
            <label class="form-label">To</label>
            <input type="date" class="form-control form-control-sm" />
          </div>
          <div class="col-md-2">
            <label class="form-label">Status</label>
            <select class="form-select form-select-sm">
              <option>Present</option>
              <option>Absent</option>
              <option>Holiday</option>
              <option>Leave</option>
            </select>
          </div>
          <div class="col-md-2">
            <label class="form-label">In Time</label>
            <input type="time" class="form-control form-control-sm" />
          </div>
          <div class="col-md-2">
            <label class="form-label">Out Time</label>
            <input type="time" class="form-control form-control-sm" />
          </div>
          <div class="col-md-2 d-flex align-items-end">
            <button class="btn btn-sm hrms-btn w-100">Mark All</button>
          </div>
        </div>
      </div>
    </div>
  </div>
</app-main-layout>
