<section class="page-hero page-hero--compact mb-4">
  <span class="page-hero__eyebrow">Skills Inventory</span>
  <h2 class="page-hero__title">Edit Skill Assignment</h2>
</section>

<div *ngIf="loading" class="alert alert-info">Loading skill assignment...</div>
<div *ngIf="error" class="alert alert-danger">{{ error }}</div>

<form class="hrms-form-shell" *ngIf="!loading" [formGroup]="form" (ngSubmit)="submit()">
  <section class="hrms-section-card">
    <header class="hrms-section-card__header">
      <span>Assignment Details</span>
    </header>
    <div class="hrms-section-card__body">
      <div class="hrms-form-grid hrms-form-grid--wide">
        <div class="hrms-form-field">
          <label class="form-label" for="skillInventoryEditEmployee">Employee Number</label>
          <input id="skillInventoryEditEmployee" type="text" class="form-control" formControlName="employeeNumber" />
          <small class="hrms-error" *ngIf="form.controls.employeeNumber.touched && form.controls.employeeNumber.invalid">
            Employee number is required.
          </small>
        </div>

        <div class="hrms-form-field">
          <label class="form-label" for="skillInventoryEditSkill">Skill</label>
          <select id="skillInventoryEditSkill" class="form-select" formControlName="skillId" (change)="onSkillChange()">
            <option [ngValue]="null">Select Skill</option>
            <option *ngFor="let s of skills" [ngValue]="s.skillId">{{ s.skillName }} ({{ s.skillCode }})</option>
          </select>
          <small class="hrms-error" *ngIf="form.controls.skillId.touched && form.controls.skillId.invalid">
            Skill is required.
          </small>
        </div>

        <div class="hrms-form-field">
          <label class="form-label" for="skillInventoryEditLevel">Skill Level</label>
          <select id="skillInventoryEditLevel" class="form-select" formControlName="skillLvlId">
            <option [ngValue]="null">Select Skill Level</option>
            <option *ngFor="let l of levels" [ngValue]="l.skillLvlId">{{ l.lvlName }} ({{ l.lvlCode }})</option>
          </select>
          <small class="hrms-error" *ngIf="form.controls.skillLvlId.touched && form.controls.skillLvlId.invalid">
            Skill level is required.
          </small>
        </div>
      </div>
    </div>
  </section>

  <div class="hrms-form-actions">
    <button type="submit" class="btn btn-primary" [disabled]="loading">Update</button>
    <a class="btn btn-outline-secondary" routerLink="/skills-inventory">Cancel</a>
  </div>
</form>
