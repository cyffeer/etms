<nav class="module-subnav mb-4">
  <a routerLink="/nihongo/results" routerLinkActive="active" class="module-subnav__link">Employee Results</a>
  <a routerLink="/nihongo/tests" routerLinkActive="active" class="module-subnav__link">Test Schedule</a>
  <a routerLink="/nihongo/types" routerLinkActive="active" class="module-subnav__link">Type Master</a>
  <a routerLink="/np-lvl-info" class="module-subnav__link">Level Rules</a>
</nav>

<section class="page-hero page-hero--compact mb-4">
  <span class="page-hero__eyebrow">Master Data</span>
  <h2 class="page-hero__title">{{ isEdit ? 'Edit' : 'Add' }} Nihongo Type</h2>
</section>

<div *ngIf="error" class="alert alert-danger">{{ error }}</div>
<div *ngIf="loading" class="alert alert-info">Loading Nihongo type...</div>

<form *ngIf="!loading" [formGroup]="form" (ngSubmit)="submit()" class="hrms-form-shell">
  <section class="hrms-section-card">
    <div class="hrms-section-card__header">Nihongo Type Information</div>
    <div class="hrms-section-card__body">
      <div class="hrms-form-grid">
        <div class="hrms-form-field">
          <label class="form-label">Type Code *</label>
          <input class="form-control" formControlName="npTypeCode" />
        </div>
        <div class="hrms-form-field">
          <label class="form-label">Type Name *</label>
          <input class="form-control" formControlName="npTypeName" />
        </div>
        <div class="hrms-form-field">
          <label class="form-label">Status</label>
          <select class="form-select" formControlName="active">
            <option [ngValue]="true">Active</option>
            <option [ngValue]="false">Inactive</option>
          </select>
        </div>
      </div>
      <div class="hrms-form-actions mt-3">
        <button class="btn btn-primary" type="submit" [disabled]="form.invalid || loading">Save</button>
        <a class="btn btn-outline-secondary" routerLink="/nihongo/types">Cancel</a>
      </div>
    </div>
  </section>
</form>
