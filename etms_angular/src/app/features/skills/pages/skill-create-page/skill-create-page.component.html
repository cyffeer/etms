<section class="page-hero page-hero--compact mb-4">
  <span class="page-hero__eyebrow">Skills Inventory</span>
  <h2 class="page-hero__title">Create Skill</h2>
</section>

<div *ngIf="loading" class="alert alert-info">Saving skill...</div>
<div *ngIf="error" class="alert alert-danger">{{ error }}</div>

<form class="hrms-form-shell" [formGroup]="form" (ngSubmit)="submit()">
  <section class="hrms-section-card">
    <header class="hrms-section-card__header">
      <span>Skill Details</span>
    </header>
    <div class="hrms-section-card__body">
      <div class="hrms-form-grid hrms-form-grid--wide">
        <div class="hrms-form-field">
          <label class="form-label" for="skillCreateCode">Skill Code</label>
          <input id="skillCreateCode" type="text" class="form-control" formControlName="skillCode" />
          <small class="hrms-error" *ngIf="form.controls.skillCode.touched && form.controls.skillCode.invalid">
            Skill code is required.
          </small>
        </div>

        <div class="hrms-form-field">
          <label class="form-label" for="skillCreateName">Skill Name</label>
          <input id="skillCreateName" type="text" class="form-control" formControlName="skillName" />
          <small class="hrms-error" *ngIf="form.controls.skillName.touched && form.controls.skillName.invalid">
            Skill name is required.
          </small>
        </div>

        <div class="hrms-form-field hrms-form-field--full">
          <label class="form-label" for="skillCreateDescription">Description</label>
          <input id="skillCreateDescription" type="text" class="form-control" formControlName="description" />
        </div>

        <div class="hrms-form-field hrms-form-field--full">
          <div class="form-check mt-2">
            <input id="skillCreateActive" class="form-check-input" type="checkbox" formControlName="active" />
            <label class="form-check-label" for="skillCreateActive">Active</label>
          </div>
        </div>
      </div>
    </div>
  </section>

  <div class="hrms-form-actions">
    <button type="submit" class="btn btn-primary" [disabled]="loading">Save</button>
    <a class="btn btn-outline-secondary" routerLink="/skills">Cancel</a>
  </div>
</form>
