<section class="page-hero page-hero--compact mb-4">
  <span class="page-hero__eyebrow">Administration</span>
  <h2 class="page-hero__title">Member Type Details</h2>
</section>

<div *ngIf="loading" class="alert alert-info">Loading member type details...</div>
<div *ngIf="error" class="alert alert-danger">{{ error }}</div>

<div class="hrms-profile-shell" *ngIf="!loading && memberType">
  <section class="hrms-section-card">
    <header class="hrms-section-card__header">
      <span>{{ memberType.memberTypeName }}</span>
    </header>
    <div class="hrms-section-card__body">
      <div class="hrms-details-grid">
        <div class="hrms-detail-item">
          <span class="hrms-detail-item__label">Member Type ID</span>
          <span class="hrms-detail-item__value">{{ memberType.memberTypeId }}</span>
        </div>
        <div class="hrms-detail-item">
          <span class="hrms-detail-item__label">Code</span>
          <span class="hrms-detail-item__value">{{ memberType.memberTypeCode }}</span>
        </div>
        <div class="hrms-detail-item">
          <span class="hrms-detail-item__label">Name</span>
          <span class="hrms-detail-item__value">{{ memberType.memberTypeName }}</span>
        </div>
        <div class="hrms-detail-item">
          <span class="hrms-detail-item__label">Status</span>
          <span class="status-pill" [ngClass]="memberType.active ? 'status-pill--active' : 'status-pill--inactive'">
            {{ memberType.active ? 'Active' : 'Inactive' }}
          </span>
        </div>
      </div>
    </div>
  </section>

  <div class="hrms-form-actions">
    <a class="btn btn-outline-secondary" routerLink="/member-types">Back</a>
    <a class="btn btn-primary" [routerLink]="['/member-types', memberType.memberTypeId, 'edit']" *ngIf="canManage">Edit</a>
  </div>
</div>
