<h2>{{ isEdit ? 'Edit Member Type' : 'Create Member Type' }}</h2>
<p *ngIf="error" style="color:#b91c1c">{{ error }}</p>

<form [formGroup]="form" (ngSubmit)="submit()">
  <label>Member Type Code</label><br />
  <input type="text" formControlName="memberTypeCode" /><br /><br />

  <label>Member Type Name</label><br />
  <input type="text" formControlName="memberTypeName" /><br /><br />

  <label><input type="checkbox" formControlName="active" /> Active</label><br /><br />

  <button type="submit" [disabled]="loading">{{ loading ? 'Saving...' : 'Save' }}</button>
  <a routerLink="/member-types" style="margin-left:8px;">Cancel</a>
</form>
