spring.application.name=etms-spring

server.port=8080

# PostgreSQL
spring.datasource.url=jdbc:postgresql://localhost:5432/etms
spring.datasource.username=postgres
spring.datasource.password=admin2255
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate / JPA baseline configuration
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=false
server.error.include-message=always
server.error.include-binding-errors=always
logging.config=classpath:log4j2-spring.xml

logging.level.org.hibernate.SQL=OFF
logging.level.org.hibernate.orm.jdbc.bind=OFF
logging.level.org.springframework.web=INFO

etms.jwt.secret=ChangeThisEtmsJwtSecretKeyForProduction1234567890
etms.jwt.expiration-minutes=480
etms.storage.employee-photos-dir=storage/employee-photos
